<div class="query-container">
  <h2>Query Editor</h2>

  <mat-card class="editor-card mb-20">
    <mat-card-content>
      <div class="header-row">
        <mat-form-field appearance="outline" class="flex-1">
          <mat-label>Database Connection</mat-label>
          <mat-select [(ngModel)]="selectedConnectionId">
            <mat-option *ngFor="let conn of connections" [value]="conn.id">
              {{ conn.name }} ({{ conn.database }})
            </mat-option>
          </mat-select>
        </mat-form-field>
      </div>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>SQL Query (SELECT only)</mat-label>
        <textarea matInput [(ngModel)]="query" rows="6" style="font-family: monospace;"></textarea>
      </mat-form-field>

      <div class="actions">
        <button mat-flat-button color="primary" (click)="runQuery()" [disabled]="!selectedConnectionId || !query || isLoading">
          Run Query
        </button>
        <mat-spinner *ngIf="isLoading" diameter="30" class="ml-10"></mat-spinner>
      </div>

      <div *ngIf="error" class="error-box mt-10">
        {{ error }}
      </div>
    </mat-card-content>
  </mat-card>

  <mat-card *ngIf="queryData.length > 0" class="results-card">
    <mat-card-header>
      <mat-card-title>Results</mat-card-title>
      <div class="spacer"></div>
      <mat-button-toggle-group [(ngModel)]="viewMode" (change)="changeViewMode($event.value)" aria-label="View Mode">
        <mat-button-toggle value="table">Table</mat-button-toggle>
        <mat-button-toggle value="bar">Bar</mat-button-toggle>
        <mat-button-toggle value="line">Line</mat-button-toggle>
        <mat-button-toggle value="pie">Pie</mat-button-toggle>
      </mat-button-toggle-group>
    </mat-card-header>
    
    <mat-card-content class="mt-20">
      
      <!-- Table View -->
      <div *ngIf="viewMode === 'table'" class="table-container">
        <table mat-table [dataSource]="queryData" class="mat-elevation-z1">
          <ng-container *ngFor="let col of columns" [matColumnDef]="col">
            <th mat-header-cell *matHeaderCellDef> {{ col }} </th>
            <td mat-cell *matCellDef="let element"> {{ element[col] }} </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="columns; sticky: true"></tr>
          <tr mat-row *matRowDef="let row; columns: columns;"></tr>
        </table>
      </div>

      <!-- Chart View -->
      <div *ngIf="viewMode !== 'table'" class="chart-container">
        <canvas baseChart
          [data]="chartData"
          [options]="chartOptions"
          [type]="chartType">
        </canvas>
      </div>

    </mat-card-content>
  </mat-card>
</div>
