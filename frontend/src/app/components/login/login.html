<div class="login-container">
  <mat-card class="login-card">
    <div class="brand">
      <img src="/assets/logo.png" alt="BIApp" class="logo" onerror="this.style.display='none'"/>
      <h2>VISUALIZATION</h2>
      <p class="subtitle">Sign in to access your visualizations and saved connections</p>
    </div>

    <mat-card-content>
      <form (ngSubmit)="login()">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Username</mat-label>
          <input matInput [(ngModel)]="credentials.username" name="username" required autocomplete="username">
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Password</mat-label>
          <input matInput [type]="showPassword ? 'text' : 'password'" [(ngModel)]="credentials.password" name="password" required autocomplete="current-password">
          <button mat-icon-button matSuffix type="button" (click)="toggleShowPassword()" [attr.aria-label]="showPassword ? 'Hide password' : 'Show password'">
            <mat-icon>{{ showPassword ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
        </mat-form-field>

        
        <div class="error" *ngIf="errorMessage">{{ errorMessage }}</div>

        <button mat-flat-button color="primary" type="submit" class="full-width mt-3">Sign in</button>

        <div class="divider"><span>or</span></div>
        <button mat-stroked-button color="primary" class="full-width register" type="button" (click)="router.navigate(['/register'])">Register / Request Access</button>
      </form>
    </mat-card-content>

    
  </mat-card>
</div>
